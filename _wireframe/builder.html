<!DOCTYPE html>
<!-- File: builder.html | Purpose: Form-based editor for stops.json. Add/edit stops and save directly to the JSON file. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4f4;
      --ink: #111111;
      --panel: #eaf0f5;
      --line: #111111;
      --accent: #111111;
      --danger: #c1121f;
      --muted: #5a5a5a;
      --sans: "Helvetica Neue", Helvetica, Arial, sans-serif;
      --mono: "JetBrains Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(90deg, rgba(0,0,0,0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(0,0,0,0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px, 28px 28px, auto;
      color: var(--ink);
      font-family: var(--sans);
    }

    .page {
      max-width: 1360px;
      margin: 0 auto;
      padding: 22px 18px 30px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    h1 {
      margin: 0 0 2px;
      font-size: clamp(1.55rem, 2.4vw, 2.3rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-actions {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      margin-top: 2px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 9px 12px;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      background: #fff;
      color: var(--ink);
      font-family: var(--sans);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.danger {
      border-color: #d9b7bf;
      color: var(--danger);
    }

    .status {
      display: none;
      font-size: 0.8rem;
      min-height: 1.2rem;
      margin-bottom: 12px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .status.ok { color: var(--accent); font-weight: 700; }
    .status.error { color: var(--danger); font-weight: 700; }
    .status.warn { color: #9a5f00; font-weight: 700; }

    .warnings {
      font-size: 0.84rem;
      color: #9a5f00;
      background: #fff7e8;
      border: 1px solid #f1d7a3;
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 10px;
      display: none;
      line-height: 1.45;
    }
    .warnings ul { margin: 0 0 0 18px; padding: 0; }
    .warnings strong { display: block; margin-bottom: 4px; }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(460px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 0;
      padding: 14px;
      box-shadow: none;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 0.78rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stack { display: flex; flex-direction: column; gap: 8px; }

    .stop-item {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 0;
      padding: 9px 108px 9px 10px;
      cursor: pointer;
      text-align: left;
      position: relative;
    }
    .stop-item.dragging { opacity: 0.45; }
    .stop-item.drag-over { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .stop-item.drop-before::before,
    .stop-item.drop-after::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      height: 2px;
      background: var(--accent);
      pointer-events: none;
    }
    .stop-item.drop-before::before { top: -7px; }
    .stop-item.drop-after::after { bottom: -7px; }
    .stop-item.locked {
      cursor: default;
      background: #f7f3ec;
    }

    .stop-item.active {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent);
    }

    .stop-actions {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      align-items: center;
      gap: 4px;
    }
    .stop-item.active .stop-actions { display: inline-flex; }
    .stop-action {
      color: #475569;
      background: #f8fafc;
      border: 2px solid currentColor;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      cursor: pointer;
      user-select: none;
    }
    .stop-action svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .stop-paste {
      color: #0f766e;
      background: #f0fdfa;
    }
    .stop-delete {
      color: #ff4d57;
      background: #ffffff;
    }
    .stop-action.disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .stop-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
      margin-bottom: 12px;
    }

    .row.full { grid-template-columns: 1fr; }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font-size: 0.86rem;
      font-family: var(--sans);
    }

    textarea {
      min-height: 74px;
      resize: vertical;
      line-height: 1.4;
    }

    .check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.84rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .check input { accent-color: var(--accent); }

    .section-title {
      margin: 0 0 10px;
      padding-top: 0;
      border-top: 0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--muted);
      font-weight: 700;
    }

    .bubble {
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
      padding: 10px;
      margin-bottom: 12px;
      cursor: grab;
      position: relative;
    }
    .bubble.dragging { opacity: 0.45; }
    .bubble.drag-over { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
    .bubble.drop-before::before,
    .bubble.drop-after::after {
      content: "";
      position: absolute;
      left: 6px;
      right: 6px;
      height: 2px;
      background: var(--accent);
      pointer-events: none;
    }
    .bubble.drop-before::before { top: -7px; }
    .bubble.drop-after::after { bottom: -7px; }

    .bubble-type-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .bubble-type-row label { margin: 0; white-space: nowrap; }
    .bubble-type-row select { width: auto; }

    .bubble-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .empty {
      font-size: 0.86rem;
      color: var(--muted);
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: #fff;
    }

    .mini-tile {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
    }

    .inline-warning {
      color: #c1121f;
      font-weight: 700;
      margin-left: 8px;
      letter-spacing: 0;
      text-transform: none;
      font-size: 0.78rem;
    }

    #headerEditor,
    #stopEditor {
      display: grid;
      gap: 18px;
    }

    #stopEditor > .section-title,
    #headerEditor > .section-title {
      margin-top: 8px;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .page-head {
        flex-direction: column;
        align-items: stretch;
      }
      .page-actions {
        margin-top: 0;
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-head">
      <div>
        <h1>Game Builder</h1>
        <p class="sub">The Game Bureau</p>
      </div>
      <div class="page-actions">
        <a id="playGameLink" href="index.html" target="_blank"><button type="button">PLAY GAME &#9654;</button></a>
        <a id="revealGameLink" href="index.html?reveal" target="_blank"><button type="button">REVEAL GAME &#9654;</button></a>
      </div>
    </div>

    <div class="toolbar">
      <button id="loadBtn" type="button">Load</button>
      <button id="newBtn" type="button">New Empty</button>
      <button id="saveBtn" class="primary" type="button">Save</button>
    </div>
    <div id="status" class="status"></div>
    <div id="warnings" class="warnings"></div>

    <div class="layout">
      <div class="card">
        <div class="toolbar">
          <button id="addStopBtn" class="primary" type="button">Add Stop</button>
        </div>
        <div id="stopList" class="stack"></div>
      </div>

      <div class="card">
        <div id="headerEditor">
          <div class="row">
            <div>
              <label for="headerTitle">TITLE / PAGE TITLE</label>
              <input id="headerTitle" type="text">
            </div>
            <div>
              <label for="headerSubtitle">Subtitle</label>
              <input id="headerSubtitle" type="text">
            </div>
          </div>
          <div class="row">
            <div>
              <label for="headerLogoUrl">Logo URL / Local File</label>
              <input id="headerLogoUrl" type="text">
            </div>
            <div>
              <label for="headerLogoAlt">LOGO ALTERNATE TEXT</label>
              <input id="headerLogoAlt" type="text">
            </div>
          </div>
          <p style="margin:8px 0 0; font-size:0.8em; color:#888;">Place <strong>logo.png</strong> (avatar image) and <strong>index.ico</strong> (browser tab icon) in the game folder.</p>
        </div>

        <div id="stopEditor" style="display:none;">
          <div class="mini-tile">
            <div class="row full" style="margin-bottom:0;">
              <div>
                <label for="stopId">STOP NAME <span id="stopNameInlineWarning" class="inline-warning" style="display:none;">DUPLICATE STOP NAME</span></label>
                <input id="stopId" type="text">
              </div>
            </div>
          </div>

          <div id="setupBubblesTop"></div>

          <div id="playerReplySection" class="mini-tile">
            <div class="section-title">Player Reply</div>
            <div class="row">
              <div>
                <label for="replyType">Reply Type</label>
                <select id="replyType">
                  <option value="text">text</option>
                  <option value="any">any (accepts anything)</option>
                </select>
              </div>
            </div>

            <div id="textReplyFields">
              <div class="row">
                <div>
                  <label for="replyPlaceholder">Placeholder</label>
                  <input id="replyPlaceholder" type="text">
                </div>
              </div>
              <div class="row full">
                <div>
                  <label for="replyAnswers">Answers (comma or newline separated)</label>
                  <textarea id="replyAnswers"></textarea>
                </div>
              </div>
            </div>

            <div id="anyReplyFields" style="display:none;">
              <div class="row">
                <div>
                  <label for="replyAnyPlaceholder">Placeholder</label>
                  <input id="replyAnyPlaceholder" type="text" placeholder="Your name&hellip;">
                </div>
                <div>
                  <label for="replyStoresAs">Store answer as variable</label>
                  <input id="replyStoresAs" type="text" placeholder="playerName">
                  <p style="margin:4px 0 0;font-size:0.8em;color:#888;">Use <code>{{playerName}}</code> in any bubble HTML.</p>
                </div>
              </div>
            </div>

          </div>

          <div id="correctSection">
            <div id="correctBubbles"></div>
          </div>

          <div id="incorrectSection">
            <div id="incorrectBubbles"></div>
          </div>

          <div id="setupBubblesBottom"></div>

          <div id="addBubbleRow" class="row" style="margin-bottom:0;">
            <div>
              <button id="addBubbleBtn" type="button">Add Message to Player</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const DEFAULT_DOC = {
      _comment: 'File: stops.json | Purpose: Source-of-truth game stops data loaded by engine.js and edited via builder.html.',
      header: {
        title: 'Scavenger Hunt',
        subtitle: 'Mission Control',
        logoUrl: 'logo.png',
        logoAlt: 'Game Logo',
        pageTitle: 'WALKING TOUR'
      },
      stops: []
    };

    const CORRECT_BUBBLE_SUGGESTIONS = [
      'Correct. Nice work.',
      'Great answer. Moving on.',
      'You got it.',
      'Perfect. Next clue unlocked.',
      'Exactly right.',
      'Right on target.',
      'Nice catch. Continue.',
      'That is correct.',
      'Excellent. Proceed.',
      'Yes. Keep going.'
    ];

    const INCORRECT_BUBBLE_SUGGESTIONS = [
      'Not quite. Try again.',
      'Close, but not correct.',
      'Incorrect. Give it another shot.',
      'That answer does not match.',
      'Nope. Try a different answer.',
      'Almost. Re-read the clue.',
      'Not yet. Check your spelling.',
      'That is not the one.',
      'Incorrect. One more try.',
      'Try again before moving on.'
    ];

    let state = JSON.parse(JSON.stringify(DEFAULT_DOC));
    let selectedStopIndex = -1;
    let stopNameBlurValidated = false;
    let loadedStopsSnapshot = null;

    const els = {
      status: document.getElementById('status'),
      stopList: document.getElementById('stopList'),
      headerEditor: document.getElementById('headerEditor'),
      stopEditor: document.getElementById('stopEditor'),
      headerTitle: document.getElementById('headerTitle'),
      headerSubtitle: document.getElementById('headerSubtitle'),
      headerLogoUrl: document.getElementById('headerLogoUrl'),
      headerLogoAlt: document.getElementById('headerLogoAlt'),
      stopId: document.getElementById('stopId'),
      stopNameInlineWarning: document.getElementById('stopNameInlineWarning'),
      setupBubblesTop: document.getElementById('setupBubblesTop'),
      setupBubblesBottom: document.getElementById('setupBubblesBottom'),
      addBubbleBtn: document.getElementById('addBubbleBtn'),
      playerReplySection: document.getElementById('playerReplySection'),
      replyType: document.getElementById('replyType'),
      textReplyFields: document.getElementById('textReplyFields'),
      anyReplyFields: document.getElementById('anyReplyFields'),
      replyAnyPlaceholder: document.getElementById('replyAnyPlaceholder'),
      replyStoresAs: document.getElementById('replyStoresAs'),
      replyPlaceholder: document.getElementById('replyPlaceholder'),
      replyAnswers: document.getElementById('replyAnswers'),
      correctSection: document.getElementById('correctSection'),
      correctBubbles: document.getElementById('correctBubbles'),
      incorrectSection: document.getElementById('incorrectSection'),
      incorrectBubbles: document.getElementById('incorrectBubbles'),
      addBubbleRow: document.getElementById('addBubbleRow'),
      warnings: document.getElementById('warnings')
    };

    function setStatus(msg, type) {
      els.status.className = 'status' + (type ? ' ' + type : '');
      els.status.textContent = msg || '';
    }

    function deepClone(v) {
      return JSON.parse(JSON.stringify(v));
    }

    function parseAnswers(text) {
      return String(text || '')
        .split(/\n|,/g)
        .map((s) => s.trim())
        .filter(Boolean);
    }

    function pickRandomSuggestion(list) {
      if (!Array.isArray(list) || !list.length) return '';
      return list[Math.floor(Math.random() * list.length)];
    }

    function nextNameFromPrevious(previousName, fallbackBase) {
      const prev = String(previousName || '').trim();
      const base = String(fallbackBase || 'setup').trim() || 'setup';
      if (!prev) return base + '-1';
      const match = prev.match(/^(.*?)(\d+)$/);
      if (!match) return prev + '-1';
      const prefix = match[1];
      const nextNum = String(parseInt(match[2], 10) + 1);
      return prefix + nextNum;
    }

    function moveItem(arr, fromIndex, toIndex) {
      if (!Array.isArray(arr)) return;
      if (fromIndex === toIndex) return;
      if (fromIndex < 0 || toIndex < 0 || fromIndex >= arr.length || toIndex >= arr.length) return;
      const [moved] = arr.splice(fromIndex, 1);
      arr.splice(toIndex, 0, moved);
    }

    function moveStopToInsertionIndex(arr, fromIndex, insertionIndex) {
      if (!Array.isArray(arr)) return fromIndex;
      if (fromIndex < 0 || fromIndex >= arr.length) return fromIndex;
      const [moved] = arr.splice(fromIndex, 1);
      let toIndex = insertionIndex;
      if (toIndex > fromIndex) toIndex -= 1;
      if (toIndex < 0) toIndex = 0;
      if (toIndex > arr.length) toIndex = arr.length;
      arr.splice(toIndex, 0, moved);
      return toIndex;
    }

    function clearStopDropIndicators() {
      els.stopList.querySelectorAll('.stop-item').forEach((el) => {
        el.classList.remove('drag-over', 'drop-before', 'drop-after');
      });
    }

    function clearBubbleDropIndicators(container) {
      container.querySelectorAll('.bubble').forEach((el) => {
        el.classList.remove('drag-over', 'drop-before', 'drop-after');
      });
    }

    function hasCallToActionBubble(stop) {
      const setup = Array.isArray(stop && stop.setup) ? stop.setup : [];
      return setup.some((b) => !!(b && b.callToAction));
    }

    function ensureReplyScaffoldForCallToAction(stop) {
      if (!stop || !stop.playerReply || typeof stop.playerReply !== 'object') {
        stop.playerReply = { type: 'text', placeholder: '', answers: [], setsTeam: false, goTo: '', correct: [], incorrect: [] };
      }
      if (!Array.isArray(stop.playerReply.correct)) stop.playerReply.correct = [];
      if (!Array.isArray(stop.playerReply.incorrect)) stop.playerReply.incorrect = [];
      if (!stop.playerReply.correct.length) {
        stop.playerReply.correct.push({
          name: stop.id + '-correct-1',
          html: pickRandomSuggestion(CORRECT_BUBBLE_SUGGESTIONS),
          callToAction: false,
          forAnswer: ''
        });
      }
      if (!stop.playerReply.incorrect.length) {
        stop.playerReply.incorrect.push({
          name: stop.id + '-incorrect-1',
          html: pickRandomSuggestion(INCORRECT_BUBBLE_SUGGESTIONS),
          callToAction: true,
          forAnswer: ''
        });
      }
    }

    function collectBubbleIds(stop) {
      const ids = [];
      const setup = Array.isArray(stop.setup) ? stop.setup : [];
      const correct = stop.playerReply && Array.isArray(stop.playerReply.correct) ? stop.playerReply.correct : [];
      const incorrect = stop.playerReply && Array.isArray(stop.playerReply.incorrect) ? stop.playerReply.incorrect : [];
      setup.forEach((b) => ids.push(String((b && b.name) || '').trim()));
      correct.forEach((b) => ids.push(String((b && b.name) || '').trim()));
      incorrect.forEach((b) => ids.push(String((b && b.name) || '').trim()));
      return ids.filter(Boolean);
    }

    function findDuplicates(values) {
      const seen = new Set();
      const dupes = new Set();
      values.forEach((v) => {
        if (seen.has(v)) dupes.add(v);
        else seen.add(v);
      });
      return Array.from(dupes);
    }

    function getValidationWarnings() {
      const warnings = [];
      const stopNamePairs = state.stops
        .map((s) => String((s && s.id) || '').trim())
        .filter(Boolean)
        .map((name) => ({ raw: name, key: name.toLowerCase() }));
      const duplicateStopNameKeys = findDuplicates(stopNamePairs.map((p) => p.key));
      if (duplicateStopNameKeys.length) {
        const displayNames = duplicateStopNameKeys.map((k) => {
          const found = stopNamePairs.find((p) => p.key === k);
          return found ? found.raw : k;
        });
        warnings.push('Two stops cannot have the same name: ' + displayNames.join(', '));
      }

      state.stops.forEach((stop) => {
        const dupes = findDuplicates(collectBubbleIds(stop));
        if (dupes.length) {
          warnings.push('Stop \u201c' + stop.id + '\u201d has duplicate bubble IDs: ' + dupes.join(', '));
        }
      });

      state.stops.forEach((stop) => {
        const ctaCount = Array.isArray(stop.setup) ? stop.setup.filter((b) => b && b.callToAction).length : 0;
        if (ctaCount > 1) {
          warnings.push('Stop \u201c' + stop.id + '\u201d has ' + ctaCount + ' call-to-action bubbles \u2014 only one is allowed per stop.');
        }
      });

      return warnings;
    }

    function renderWarnings() {
      const warnings = getValidationWarnings();
      if (!warnings.length) {
        els.warnings.style.display = 'none';
        els.warnings.innerHTML = '';
        return warnings;
      }
      els.warnings.style.display = 'block';
      els.warnings.innerHTML = '<strong>Validation Warnings</strong><ul>' + warnings.map((w) => '<li>' + w + '</li>').join('') + '</ul>';
      return warnings;
    }

    function renderInlineStopNameWarning() {
      const stop = getSelectedStop();
      if (!stop || selectedStopIndex < 0) {
        els.stopNameInlineWarning.style.display = 'none';
        return;
      }
      if (!stopNameBlurValidated) {
        els.stopNameInlineWarning.style.display = 'none';
        return;
      }
      const name = String(stop.id || '').trim().toLowerCase();
      if (!name) {
        els.stopNameInlineWarning.style.display = 'none';
        return;
      }
      const dupCount = state.stops.filter((s) => String((s && s.id) || '').trim().toLowerCase() === name).length;
      els.stopNameInlineWarning.style.display = dupCount > 1 ? 'inline' : 'none';
    }

    function answersToText(arr) {
      return Array.isArray(arr) ? arr.join('\n') : '';
    }

    function ensureBubble(b) {
      if (!b || typeof b !== 'object') return { name: '', html: '', callToAction: false, forAnswer: '', bottomAdded: false };
      return {
        name: String(b.name || ''),
        html: String(b.html || ''),
        callToAction: !!(b.callToAction || b.red || b.cmd),
        forAnswer: String(b.forAnswer || ''),
        bottomAdded: !!b.bottomAdded
      };
    }

    function ensurePlayerReply(r) {
      if (!r || typeof r !== 'object') {
        return { type: 'text', placeholder: '', answers: [], setsTeam: false, goTo: '', correct: [], incorrect: [] };
      }
      const allBubbles = (arr) => Array.isArray(arr) ? arr.map(ensureBubble) : [];
      const type = r.type === 'any' ? r.type : 'text';
      const base = {
        type,
        correct: allBubbles(r.correct),
        incorrect: allBubbles(r.incorrect)
      };
      if (type === 'any') {
        base.placeholder = String(r.placeholder || '');
        base.storesAs = String(r.storesAs || '');
        return base;
      }
      base.placeholder = String(r.placeholder || '');
      base.answers = Array.isArray(r.answers) ? r.answers.map((x) => String(x)) : [];
      base.setsTeam = !!r.setsTeam;
      base.goTo = String(r.goTo || '');
      return base;
    }

    function ensureStop(s, i) {
      return {
        id: String((s && s.id) || ('stop-' + (i + 1))),
        setup: Array.isArray(s && s.setup)
          ? s.setup.map(ensureBubble)
          : Array.isArray(s && s.reveal)
            ? s.reveal.map(ensureBubble)
            : [],
        playerReply: ensurePlayerReply((s && s.playerReply) || (s && s.action) || null)
      };
    }

    function ensureDoc(doc) {
      if (!doc || typeof doc !== 'object' || Array.isArray(doc)) {
        throw new Error('Top-level JSON must be an object.');
      }
      const out = deepClone(DEFAULT_DOC);
      if (doc.header && typeof doc.header === 'object') {
        out.header = Object.assign({}, out.header, doc.header);
      }
      if (!Array.isArray(doc.stops)) {
        throw new Error('Missing "stops" array.');
      }
      out.stops = doc.stops.map(ensureStop);
      if (typeof doc._comment === 'string') out._comment = doc._comment;
      return out;
    }

    function getSelectedStop() {
      if (selectedStopIndex < 0 || selectedStopIndex >= state.stops.length) return null;
      return state.stops[selectedStopIndex];
    }

    function createEmptyStop() {
      const id = 'new-stop-' + (state.stops.length + 1);
      return {
        id,
        setup: [
          { name: id + '-message-1', html: '', callToAction: false, bottomAdded: false },
          { name: id + '-call-to-action-1', html: '', callToAction: true, bottomAdded: false }
        ],
        playerReply: {
          type: 'text',
          placeholder: '',
          answers: [],
          setsTeam: false,
          goTo: '',
          correct: [{ name: id + '-correct-1', html: '', callToAction: false, forAnswer: '' }],
          incorrect: [{ name: id + '-incorrect-1', html: '', callToAction: true, forAnswer: '' }]
        }
      };
    }


    function renderStopList() {
      els.stopList.innerHTML = '';

      const headerBtn = document.createElement('button');
      headerBtn.type = 'button';
      headerBtn.className = 'stop-item locked' + (selectedStopIndex === -1 ? ' active' : '');
      headerBtn.innerHTML = '<div>GAME DETAILS</div>';
      headerBtn.addEventListener('click', () => {
        selectedStopIndex = -1;
        stopNameBlurValidated = false;
        renderAll();
      });
      els.stopList.appendChild(headerBtn);

      if (!state.stops.length) return;

      state.stops.forEach((stop, i) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'stop-item' + (i === selectedStopIndex ? ' active' : '');
        btn.dataset.stopIndex = String(i);
        btn.draggable = true;
        const totalBubbles = (Array.isArray(stop.setup) ? stop.setup.length : 0)
          + (Array.isArray(stop.playerReply && stop.playerReply.correct) ? stop.playerReply.correct.length : 0)
          + (Array.isArray(stop.playerReply && stop.playerReply.incorrect) ? stop.playerReply.incorrect.length : 0);
        btn.innerHTML = '<div>' + stop.id + '</div><div class="stop-meta">Bubbles: ' + totalBubbles + '</div>'
          + (i === selectedStopIndex
            ? '<span class="stop-actions">'
              + '<span class="stop-action stop-copy" title="Copy stop" aria-label="Copy stop"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="2" ry="2"></rect><rect x="5" y="5" width="10" height="10" rx="2" ry="2"></rect></svg></span>'
              + '<span class="stop-action stop-paste' + (copiedStop ? '' : ' disabled') + '" title="Paste stop" aria-label="Paste stop"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="6" y="5" width="12" height="14" rx="2" ry="2"></rect><path d="M9 5V3h6v2"></path><path d="M9 11h6"></path><path d="M9 15h6"></path></svg></span>'
              + '<span class="stop-action stop-delete" title="Remove stop" aria-label="Remove stop"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><rect x="6" y="6" width="12" height="14" rx="2" ry="2"/><path d="M10 10v7"/><path d="M14 10v7"/></svg></span>'
              + '</span>'
            : '');
        btn.addEventListener('click', () => {
          selectedStopIndex = i;
          stopNameBlurValidated = false;
          renderAll();
        });

        const stopCopy = btn.querySelector('.stop-copy');
        if (stopCopy) {
          stopCopy.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            copiedStop = JSON.parse(JSON.stringify(stop));
            setStatus('Stop copied.', 'ok');
            renderAll();
          });
        }

        const stopPaste = btn.querySelector('.stop-paste');
        if (stopPaste) {
          stopPaste.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!copiedStop) return;
            const clone = JSON.parse(JSON.stringify(copiedStop));
            const oldId = clone.id;
            clone.id = oldId + '-copy';
            const renameBubble = (b) => {
              if (b && b.name && String(b.name).startsWith(oldId)) {
                b.name = clone.id + b.name.slice(oldId.length);
              }
              return b;
            };
            if (Array.isArray(clone.setup)) clone.setup = clone.setup.map(renameBubble);
            if (clone.playerReply) {
              if (Array.isArray(clone.playerReply.correct)) clone.playerReply.correct = clone.playerReply.correct.map(renameBubble);
              if (Array.isArray(clone.playerReply.incorrect)) clone.playerReply.incorrect = clone.playerReply.incorrect.map(renameBubble);
            }
            const insertAt = selectedStopIndex >= 0 ? selectedStopIndex + 1 : state.stops.length;
            state.stops.splice(insertAt, 0, clone);
            selectedStopIndex = insertAt;
            stopNameBlurValidated = false;
            renderAll();
          });
        }

        const stopDelete = btn.querySelector('.stop-delete');
        if (stopDelete) {
          stopDelete.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            state.stops.splice(i, 1);
            if (!state.stops.length) selectedStopIndex = -1;
            else if (selectedStopIndex >= state.stops.length) selectedStopIndex = state.stops.length - 1;
            renderAll();
          });
        }
        btn.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/x-stop-index', String(i));
          e.dataTransfer.effectAllowed = 'move';
          btn.classList.add('dragging');
        });
        btn.addEventListener('dragend', () => {
          clearStopDropIndicators();
          btn.classList.remove('dragging');
        });
        btn.addEventListener('dragover', (e) => {
          e.preventDefault();
          const rect = btn.getBoundingClientRect();
          const before = e.clientY < rect.top + rect.height / 2;
          clearStopDropIndicators();
          btn.classList.add('drag-over');
          btn.classList.add(before ? 'drop-before' : 'drop-after');
        });
        btn.addEventListener('dragleave', () => {
          btn.classList.remove('drag-over', 'drop-before', 'drop-after');
        });
        btn.addEventListener('drop', (e) => {
          e.preventDefault();
          const rect = btn.getBoundingClientRect();
          const before = e.clientY < rect.top + rect.height / 2;
          clearStopDropIndicators();
          const fromIndex = parseInt(e.dataTransfer.getData('text/x-stop-index') || '-1', 10);
          if (isNaN(fromIndex) || fromIndex < 0 || fromIndex >= state.stops.length) return;
          const insertionIndex = i + (before ? 0 : 1);
          const newIndex = moveStopToInsertionIndex(state.stops, fromIndex, insertionIndex);

          if (selectedStopIndex === fromIndex) {
            selectedStopIndex = newIndex;
          } else {
            if (fromIndex < selectedStopIndex) selectedStopIndex -= 1;
            if (newIndex <= selectedStopIndex) selectedStopIndex += 1;
          }
          renderAll();
        });
        els.stopList.appendChild(btn);
      });
    }

    function generateBubbleHtml(bubble) {
      const t = bubble.msgType || 'text';
      if (t === 'image') {
        const src = (bubble.src || '').replace(/"/g, '&quot;');
        const alt = (bubble.alt || '').replace(/"/g, '&quot;');
        return '<img src="' + src + '" alt="' + alt + '" style="max-width:100%;">';
      }
      if (t === 'video') {
        const src = (bubble.src || '').replace(/"/g, '&quot;');
        return '<video src="' + src + '" controls style="max-width:100%;"></video>';
      }
      if (t === 'button') {
        const label = bubble.label || 'Button';
        const href = (bubble.href || '#').replace(/"/g, '&quot;');
        return '<a href="' + href + '" class="action-btn">' + label + '</a>';
      }
      return bubble.html || '';
    }

    function renderBubbles(container, bubbles, listKey, options) {
      const opts = options || {};
      const sourceIndexes = Array.isArray(opts.sourceIndexes) ? opts.sourceIndexes : null;
      const setupGroup = String(opts.setupGroup || '');
      container.innerHTML = '';
      if (!bubbles.length) return;

      bubbles.forEach((bubble, idx) => {
        if (!String(bubble.html || '').trim()) {
          const suggestions = listKey === 'correct'
            ? CORRECT_BUBBLE_SUGGESTIONS
            : listKey === 'incorrect'
              ? INCORRECT_BUBBLE_SUGGESTIONS
              : null;
          if (suggestions && suggestions.length) {
            bubble.html = pickRandomSuggestion(suggestions);
          }
        }
        const wrap = document.createElement('div');
        wrap.className = 'bubble';
        const isMessageToPlayer = listKey === 'setup' && !(bubble && bubble.callToAction);
        const canDrag = isMessageToPlayer;
        if (canDrag) wrap.draggable = true;
        const showBubbleTypeLabel = listKey === 'setup';
        const nameLabel = listKey === 'setup'
          ? '<label>' + (bubble.callToAction ? 'CALL PLAYER TO ACTION' : 'MESSAGE TO PLAYER') + '</label>'
          : listKey === 'correct'
            ? '<label>CORRECT BUBBLE</label>'
            : listKey === 'incorrect'
              ? '<label>INCORRECT BUBBLE</label>'
              : '';
        const showForAnswer = listKey === 'correct' || listKey === 'incorrect';
        const showRemove = listKey === 'setup' && !(bubble && bubble.callToAction);
        const msgType = isMessageToPlayer ? (bubble.msgType || 'text') : null;
        const typeSelector = isMessageToPlayer
          ? '<div class="bubble-type-row"><label>Type</label><select class="msg-type-select">' +
            ['text', 'image', 'video', 'button'].map(t =>
              '<option value="' + t + '"' + (t === msgType ? ' selected' : '') + '>' + t + '</option>'
            ).join('') +
            '</select></div>'
          : '';
        const msgContent = isMessageToPlayer
          ? '<div class="msg-type-section" data-type="text"' + (msgType !== 'text' ? ' style="display:none"' : '') + '>' +
              '<label>HTML</label><textarea class="bubble-html-input">' + String(bubble.html || '') + '</textarea>' +
            '</div>' +
            '<div class="msg-type-section" data-type="image"' + (msgType !== 'image' ? ' style="display:none"' : '') + '>' +
              '<label>Image URL</label><input type="text" class="bubble-src-input" placeholder="https://..." value="' + String(bubble.src || '').replace(/"/g, '&quot;') + '">' +
              '<label style="margin-top:6px;">Alt text</label><input type="text" class="bubble-alt-input" placeholder="description" value="' + String(bubble.alt || '').replace(/"/g, '&quot;') + '">' +
            '</div>' +
            '<div class="msg-type-section" data-type="video"' + (msgType !== 'video' ? ' style="display:none"' : '') + '>' +
              '<label>Video URL (.mp4 or YouTube embed)</label><input type="text" class="bubble-src-input" placeholder="https://..." value="' + String(bubble.src || '').replace(/"/g, '&quot;') + '">' +
            '</div>' +
            '<div class="msg-type-section" data-type="button"' + (msgType !== 'button' ? ' style="display:none"' : '') + '>' +
              '<label>Button label</label><input type="text" class="bubble-label-input" placeholder="Click here" value="' + String(bubble.label || '').replace(/"/g, '&quot;') + '">' +
              '<label style="margin-top:6px;">Link (href)</label><input type="text" class="bubble-href-input" placeholder="#" value="' + String(bubble.href || '').replace(/"/g, '&quot;') + '">' +
            '</div>'
          : '<label>HTML</label><textarea>' + String(bubble.html || '') + '</textarea>';

        wrap.innerHTML = [
          nameLabel,
          '<div class="bubble-top">',
          '  <input type="text" class="bubble-name-input" placeholder="bubble-name" value="' + String(bubble.name || '').replace(/"/g, '&quot;') + '">',
          showRemove ? '  <button type="button" class="danger">Remove</button>' : '',
          '</div>',
          showForAnswer
            ? '<div style="margin-bottom:8px;"><label>For Answer (BLANK = ANY)</label><input type="text" class="for-answer-input" placeholder="leave blank to show for any answer" value="' + String(bubble.forAnswer || '').replace(/"/g, '&quot;') + '"></div>'
            : '',
          isMessageToPlayer ? typeSelector + msgContent : msgContent
        ].join('');

        const nameInput = wrap.querySelector('.bubble-name-input');
        const forAnswerInput = wrap.querySelector('.for-answer-input');
        const removeBtn = wrap.querySelector('button');

        nameInput.addEventListener('input', (e) => {
          bubbles[idx].name = e.target.value;
        });
        if (forAnswerInput) {
          forAnswerInput.addEventListener('input', (e) => {
            bubbles[idx].forAnswer = e.target.value;
          });
        }
        if (isMessageToPlayer) {
          const typeSelect = wrap.querySelector('.msg-type-select');
          const htmlInput = wrap.querySelector('.bubble-html-input');
          const srcInput = wrap.querySelector('.bubble-src-input');
          const altInput = wrap.querySelector('.bubble-alt-input');
          const labelInput = wrap.querySelector('.bubble-label-input');
          const hrefInput = wrap.querySelector('.bubble-href-input');
          if (typeSelect) {
            typeSelect.addEventListener('change', (e) => {
              bubble.msgType = e.target.value;
              wrap.querySelectorAll('.msg-type-section').forEach(s => {
                s.style.display = s.dataset.type === e.target.value ? '' : 'none';
              });
              bubble.html = generateBubbleHtml(bubble);
            });
          }
          if (htmlInput) {
            htmlInput.addEventListener('input', (e) => { bubble.html = e.target.value; });
          }
          if (srcInput) {
            srcInput.addEventListener('input', (e) => {
              bubble.src = e.target.value;
              bubble.html = generateBubbleHtml(bubble);
            });
          }
          if (altInput) {
            altInput.addEventListener('input', (e) => {
              bubble.alt = e.target.value;
              bubble.html = generateBubbleHtml(bubble);
            });
          }
          if (labelInput) {
            labelInput.addEventListener('input', (e) => {
              bubble.label = e.target.value;
              bubble.html = generateBubbleHtml(bubble);
            });
          }
          if (hrefInput) {
            hrefInput.addEventListener('input', (e) => {
              bubble.href = e.target.value;
              bubble.html = generateBubbleHtml(bubble);
            });
          }
        } else {
          const htmlInput = wrap.querySelector('textarea');
          if (htmlInput) {
            htmlInput.addEventListener('input', (e) => { bubbles[idx].html = e.target.value; });
          }
        }
        if (removeBtn) {
          removeBtn.addEventListener('click', () => {
            const stop = getSelectedStop();
            const removedWasCallToAction = listKey === 'setup' && !!(bubbles[idx] && bubbles[idx].callToAction);
            if (listKey === 'setup' && stop && Array.isArray(stop.setup)) {
              const sourceIndex = stop.setup.indexOf(bubbles[idx]);
              if (sourceIndex >= 0) stop.setup.splice(sourceIndex, 1);
            } else {
              bubbles.splice(idx, 1);
            }
            if (removedWasCallToAction && stop && stop.playerReply) {
              stop.playerReply.correct = [];
              stop.playerReply.incorrect = [];
            }
            renderAll();
          });
        }
        if (canDrag) {
          wrap.addEventListener('dragstart', (e) => {
            if (e.target.closest('input, textarea, select, button')) { e.preventDefault(); return; }
            const payload = listKey === 'setup'
              ? {
                  listKey: 'setup',
                  sourceIndex: sourceIndexes && typeof sourceIndexes[idx] === 'number' ? sourceIndexes[idx] : idx,
                  setupGroup
                }
              : { listKey, index: idx };
            e.dataTransfer.setData('application/x-bubble', JSON.stringify(payload));
            e.dataTransfer.effectAllowed = 'move';
            wrap.classList.add('dragging');
          });
          wrap.addEventListener('dragend', () => {
            clearBubbleDropIndicators(container);
            wrap.classList.remove('dragging');
          });
          wrap.addEventListener('dragover', (e) => {
            e.preventDefault();
            const rect = wrap.getBoundingClientRect();
            const before = e.clientY < rect.top + rect.height / 2;
            clearBubbleDropIndicators(container);
            wrap.classList.add('drag-over');
            wrap.classList.add(before ? 'drop-before' : 'drop-after');
          });
          wrap.addEventListener('dragleave', () => {
            wrap.classList.remove('drag-over', 'drop-before', 'drop-after');
          });
          wrap.addEventListener('drop', (e) => {
            e.preventDefault();
            const rect = wrap.getBoundingClientRect();
            const before = e.clientY < rect.top + rect.height / 2;
            clearBubbleDropIndicators(container);
            let payload = null;
            try {
              payload = JSON.parse(e.dataTransfer.getData('application/x-bubble') || 'null');
            } catch (_) {
              return;
            }
            if (!payload || payload.listKey !== listKey) return;
            if (listKey === 'setup') {
              if (payload.setupGroup !== setupGroup) return;
              const stop = getSelectedStop();
              if (!stop || !Array.isArray(stop.setup)) return;
              const fromSourceIndex = parseInt(payload.sourceIndex, 10);
              const toSourceIndex = sourceIndexes && typeof sourceIndexes[idx] === 'number' ? sourceIndexes[idx] : -1;
              if (isNaN(fromSourceIndex) || fromSourceIndex < 0 || fromSourceIndex >= stop.setup.length) return;
              if (toSourceIndex < 0 || toSourceIndex >= stop.setup.length) return;
              const insertionIndex = toSourceIndex + (before ? 0 : 1);
              moveStopToInsertionIndex(stop.setup, fromSourceIndex, insertionIndex);
              renderAll();
              return;
            }
            const fromIndex = parseInt(payload.index, 10);
            if (isNaN(fromIndex) || fromIndex < 0 || fromIndex >= bubbles.length) return;
            const insertionIndex = idx + (before ? 0 : 1);
            moveStopToInsertionIndex(bubbles, fromIndex, insertionIndex);
            renderAll();
          });
        }

        container.appendChild(wrap);
      });
    }

    function renderStopEditor() {
      const stop = getSelectedStop();
      if (selectedStopIndex === -1) {
        els.headerEditor.style.display = 'grid';
        els.stopEditor.style.display = 'none';
        return;
      }

      if (!stop) {
        els.headerEditor.style.display = 'none';
        els.stopEditor.style.display = 'none';
        return;
      }

      els.headerEditor.style.display = 'none';
      els.stopEditor.style.display = 'grid';

      els.stopId.value = stop.id;
      els.replyType.value = stop.playerReply.type;

      els.textReplyFields.style.display = stop.playerReply.type === 'text' ? 'block' : 'none';
      els.anyReplyFields.style.display = stop.playerReply.type === 'any' ? 'block' : 'none';

      els.replyPlaceholder.value = stop.playerReply.placeholder || '';
      els.replyAnswers.value = answersToText(stop.playerReply.answers || []);
      els.replyAnyPlaceholder.value = stop.playerReply.placeholder || '';
      els.replyStoresAs.value = stop.playerReply.storesAs || '';

      const showReplyFlow = hasCallToActionBubble(stop);
      els.playerReplySection.style.display = showReplyFlow ? 'block' : 'none';
      els.correctSection.style.display = showReplyFlow ? 'block' : 'none';
      els.incorrectSection.style.display = showReplyFlow ? 'block' : 'none';

      // Two setup zones:
      // top = initial scaffold bubbles, bottom = newly added Message-to-Player bubbles.
      els.stopEditor.appendChild(els.setupBubblesTop);
      els.stopEditor.appendChild(els.playerReplySection);
      els.stopEditor.appendChild(els.correctSection);
      els.stopEditor.appendChild(els.incorrectSection);
      els.stopEditor.appendChild(els.setupBubblesBottom);
      els.stopEditor.appendChild(els.addBubbleRow);

      const topSetupWithIndex = stop.setup
        .map((b, i) => ({ bubble: b, sourceIndex: i }))
        .filter((x) => !x.bubble.bottomAdded);
      const bottomSetupWithIndex = stop.setup
        .map((b, i) => ({ bubble: b, sourceIndex: i }))
        .filter((x) => !!x.bubble.bottomAdded);
      renderBubbles(
        els.setupBubblesTop,
        topSetupWithIndex.map((x) => x.bubble),
        'setup',
        { sourceIndexes: topSetupWithIndex.map((x) => x.sourceIndex), setupGroup: 'top' }
      );
      renderBubbles(
        els.setupBubblesBottom,
        bottomSetupWithIndex.map((x) => x.bubble),
        'setup',
        { sourceIndexes: bottomSetupWithIndex.map((x) => x.sourceIndex), setupGroup: 'bottom' }
      );
      renderBubbles(els.correctBubbles, stop.playerReply.correct || [], 'correct');
      renderBubbles(els.incorrectBubbles, stop.playerReply.incorrect || [], 'incorrect');
    }

    function renderHeader() {
      const h = state.header || DEFAULT_DOC.header;
      els.headerTitle.value = h.title || '';
      els.headerSubtitle.value = h.subtitle || '';
      els.headerLogoUrl.value = h.logoUrl || '';
      els.headerLogoAlt.value = h.logoAlt || '';
    }

    function renderAll() {
      renderHeader();
      renderStopList();
      renderStopEditor();
      renderWarnings();
      renderInlineStopNameWarning();
    }

    function attachHeaderEvents() {
      els.headerTitle.addEventListener('input', (e) => {
        state.header.title = e.target.value;
        state.header.pageTitle = e.target.value;
      });
      els.headerSubtitle.addEventListener('input', (e) => { state.header.subtitle = e.target.value; });
      els.headerLogoUrl.addEventListener('input', (e) => { state.header.logoUrl = e.target.value; });
      els.headerLogoAlt.addEventListener('input', (e) => { state.header.logoAlt = e.target.value; });
    }

    function attachStopEvents() {
      els.stopId.addEventListener('input', (e) => {
        const stop = getSelectedStop();
        if (!stop) return;
        stop.id = e.target.value;
        stopNameBlurValidated = false;
        renderStopList();
        renderInlineStopNameWarning();
      });

      els.stopId.addEventListener('blur', () => {
        const stop = getSelectedStop();
        if (!stop) return;
        stopNameBlurValidated = true;
        renderInlineStopNameWarning();
      });

      els.replyType.addEventListener('change', (e) => {
        const stop = getSelectedStop();
        if (!stop) return;
        const nextType = e.target.value;
        const correct = Array.isArray(stop.playerReply.correct) ? stop.playerReply.correct : [];
        const incorrect = Array.isArray(stop.playerReply.incorrect) ? stop.playerReply.incorrect : [];

        if (nextType === 'any') {
          stop.playerReply = { type: 'any', placeholder: '', storesAs: '', correct, incorrect };
        } else {
          stop.playerReply = { type: 'text', placeholder: '', answers: [], setsTeam: false, goTo: '', correct, incorrect };
        }
        renderAll();
      });

      els.replyPlaceholder.addEventListener('input', (e) => {
        const stop = getSelectedStop();
        if (!stop || stop.playerReply.type !== 'text') return;
        stop.playerReply.placeholder = e.target.value;
      });

      els.replyAnswers.addEventListener('input', (e) => {
        const stop = getSelectedStop();
        if (!stop || stop.playerReply.type !== 'text') return;
        stop.playerReply.answers = parseAnswers(e.target.value);
      });

      els.replyAnyPlaceholder.addEventListener('input', (e) => {
        const stop = getSelectedStop();
        if (!stop || stop.playerReply.type !== 'any') return;
        stop.playerReply.placeholder = e.target.value;
      });

      els.replyStoresAs.addEventListener('input', (e) => {
        const stop = getSelectedStop();
        if (!stop || stop.playerReply.type !== 'any') return;
        stop.playerReply.storesAs = e.target.value;
      });


      els.addBubbleBtn.addEventListener('click', () => {
        const stop = getSelectedStop();
        if (!stop) return;
        const previous = stop.setup.length ? stop.setup[stop.setup.length - 1] : null;
        const nextName = nextNameFromPrevious(previous && previous.name, stop.id + '-message');
        stop.setup.push({ name: nextName, msgType: 'text', html: '', callToAction: false, bottomAdded: true });
        renderAll();
      });
    }

    function toDoc() {
      const doc = {
        _comment: state._comment || DEFAULT_DOC._comment,
        header: Object.assign({}, DEFAULT_DOC.header, state.header || {}),
        stops: state.stops.map((s, i) => {
          const normalized = ensureStop(s, i);
          return {
            id: normalized.id,
            setup: normalized.setup,
            playerReply: normalized.playerReply
          };
        })
      };
      doc.header.pageTitle = doc.header.title || '';
      return doc;
    }

    function docsEqual(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    async function loadStopsFile(options) {
      const opts = options || {};
      const skipConfirm = !!opts.skipConfirm;
      try {
        const resp = await fetch('stops.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const doc = ensureDoc(await resp.json());
        const currentDoc = toDoc();
        if (!skipConfirm && !docsEqual(currentDoc, doc)) {
          const ok = window.confirm('Builder has unsaved changes different from ./stops.json. Load anyway and replace current contents?');
          if (!ok) return;
        }
        state = doc;
        loadedStopsSnapshot = deepClone(doc);
        selectedStopIndex = -1;
        stopNameBlurValidated = false;
        renderAll();
        setStatus('Loaded ./stops.json from this folder.', 'ok');
      } catch (err) {
        setStatus('Unable to load ./stops.json: ' + err.message, 'error');
      }
    }

    function downloadStops(text) {
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'stops.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function saveStops() {
      try {
        const doc = toDoc();
        const text = JSON.stringify(doc, null, 2) + '\n';
        downloadStops(text);
        const warnings = renderWarnings();
        if (warnings.length) {
          setStatus('Downloaded stops.json with validation warnings shown below.', 'warn');
        } else {
          setStatus('Downloaded stops.json. Replace ./stops.json in this folder with the downloaded file.', 'ok');
        }
      } catch (err) {
        setStatus(err.message || 'Save cancelled.', 'error');
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadStopsFile);
    document.getElementById('saveBtn').addEventListener('click', saveStops);
    function openGameWithSavePrompt(url) {
      const differsFromLoaded = loadedStopsSnapshot && !docsEqual(toDoc(), loadedStopsSnapshot);
      if (differsFromLoaded) {
        const saveFirst = window.confirm('Builder differs from ./stops.json. Click OK to save first, or Cancel to open without saving.');
        if (saveFirst) saveStops();
      }
      window.open(url, '_blank');
    }
    document.getElementById('playGameLink').addEventListener('click', (e) => {
      e.preventDefault();
      openGameWithSavePrompt('index.html');
    });
    document.getElementById('revealGameLink').addEventListener('click', (e) => {
      e.preventDefault();
      openGameWithSavePrompt('index.html?reveal');
    });

    document.getElementById('newBtn').addEventListener('click', () => {
      const currentDoc = toDoc();
      if (!docsEqual(currentDoc, DEFAULT_DOC)) {
        const ok = window.confirm('Clear the current builder contents and start a new empty document?');
        if (!ok) return;
      }
      state = deepClone(DEFAULT_DOC);
      selectedStopIndex = -1;
      stopNameBlurValidated = false;
      renderAll();
      setStatus('New empty document ready.', 'ok');
    });

    document.getElementById('addStopBtn').addEventListener('click', () => {
      const stop = createEmptyStop();
      const insertAt = state.stops.length;
      state.stops.splice(insertAt, 0, stop);
      selectedStopIndex = insertAt;
      stopNameBlurValidated = false;
      renderAll();
    });

    let copiedStop = null;
    attachHeaderEvents();
    attachStopEvents();
    renderAll();
    loadStopsFile({ skipConfirm: true });
  </script>
</body>
</html>
