<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALKING TOUR</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📱%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #111827;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Messaging app contact header ─────────────────────────── */
    .contact-header {
      background: #f9f9f9;
      border-bottom: 1px solid #e5e7eb;
      padding: 0.5rem 1rem 0.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      position: relative;
    }
    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
      margin-bottom: 0.2rem;
      touch-action: none;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; pointer-events: none; }
    .contact-name {
      font-size: 0.9rem; font-weight: 600; color: #111827; line-height: 1.3;
    }
    .contact-status {
      font-size: 0.72rem; color: #6b7280; display: flex; align-items: center; gap: 4px;
    }
    .online-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ecf98; flex-shrink: 0;
    }

    /* ── Chat scroll area ────────────────────────────────────────── */
    .chat {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 1rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.35rem;
    }

    /* ── Message bubbles ─────────────────────────────────────────── */
    .msg { max-width: 80%; animation: slideIn 0.25s ease; }
    .msg.from-game   { align-self: flex-start; }
    .msg.from-player { align-self: flex-end; }

    .msg-bubble {
      padding: 0.6rem 0.9rem;
      border-radius: 20px;
      line-height: 1.5;
      word-wrap: break-word;
      font-size: 1.5rem;
      font-weight: 700;
      overflow: hidden;
    }
    .msg.from-game .msg-bubble {
      background: #007AFF;
      border-bottom-left-radius: 5px;
      color: #ffffff;
    }
    .msg.from-player .msg-bubble {
      background: #e5e7eb; color: #111827;
      border-bottom-right-radius: 5px;
    }



    .msg-bubble p { margin: 0 0 0.6rem; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble a { color: #ffffff; word-break: break-all; }
    .msg.from-player .msg-bubble a { color: #01b9d8; }
    .msg.has-img { max-width: 92%; }
    .msg-bubble p:has(> img:only-child) { margin: -0.6rem -0.9rem; }
    .msg-bubble p:has(> img:only-child) + p { margin-top: 0.6rem; }
    .msg-bubble img { width: 100%; max-width: 100%; display: block; border-radius: 0; cursor: zoom-in; }

    /* ── Lightbox ──────────────────────────────────────────────────── */
    .lb {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.93); z-index: 9999;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lb.open { display: flex; }
    .lb img { max-width: 100vw; max-height: 100vh; object-fit: contain; }

    /* ── Open-cipher button inside a chat bubble ─────────────────── */
    .open-cipher-btn {
      display: block; width: 100%;
      margin-top: 0.5rem;
      background: rgba(0,0,0,0.2);
      border: 1.5px solid rgba(255,255,255,0.45);
      color: #ffffff;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      letter-spacing: 0.02em;
      padding: 10px 16px; border-radius: 12px;
      cursor: pointer; text-align: center;
      transition: background 0.15s;
    }
    .open-cipher-btn:active { background: rgba(0,0,0,0.4); }

    /* ── Typing indicator ─────────────────────────────────────────── */
    .typing {
      align-self: flex-start;
      background: #007AFF; border-radius: 20px; border-bottom-left-radius: 5px;
      padding: 0.55rem 0.9rem;
      display: flex; gap: 4px; align-items: center;
    }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.7);
      animation: typingBounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input area ──────────────────────────────────────────────── */
    .input-area {
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      padding: 0.6rem 0.75rem;
      flex-shrink: 0;
    }
    .answer-row { display: flex; gap: 0.5rem; align-items: center; }
    .answer-input {
      flex: 1;
      background: #f3f4f6;
      border: 2px solid #e5e7eb;
      border-radius: 24px;
      padding: 0.6rem 1rem;
      color: #111827; font-size: 1rem;
      outline: none;
      -webkit-appearance: none; appearance: none;
      transition: border-color 0.2s, opacity 0.2s;
    }
    .answer-input:focus { border-color: #01b9d8; }
    .answer-input:disabled { opacity: 0.4; }
    .answer-input.wrong { border-color: #e85568; animation: shake 0.35s ease; }
    .answer-input::placeholder { color: #9ca3af; }
    .answer-input::-webkit-contacts-auto-fill-button,
    .answer-input::-webkit-credentials-auto-fill-button { visibility: hidden; pointer-events: none; }

    .submit-btn {
      background: #01b9d8; border: none; border-radius: 50%;
      width: 44px; height: 44px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
    }
    .submit-btn:active { transform: scale(0.9); background: #0199b5; }
    .submit-btn:disabled { opacity: 0.35; cursor: default; }

    /* Choice buttons */
    .btn-choices { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.4rem; }
    .choice-btn {
      padding: 0.7rem 1rem; border-radius: 12px; border: 2px solid;
      background: transparent; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; text-align: left; transition: opacity 0.15s;
    }
    .choice-btn:active { opacity: 0.6; }
    .choice-btn.team-beignet   { border-color: #6aaef7; color: #6aaef7; }
    .choice-btn.team-lagniappe { border-color: #f5a623; color: #f5a623; }
    .choice-btn.team-rougarou  { border-color: #e85568; color: #e85568; }
    .choice-btn.team-tch       { border-color: #4ecf98; color: #4ecf98; }
    .choice-btn.neutral        { border-color: #d1d5db; color: #374151; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }

    /* ── Team Cipher overlay ─────────────────────────────────────── */
    .team-overlay {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }
    .team-overlay.open { transform: translateY(0); }
    .overlay-bar {
      background: #041c2e;
      border-bottom: 1px solid rgba(1,185,216,0.35);
      padding: 0.55rem 1rem;
      display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; color: #01b9d8;
      font-size: 1rem; cursor: pointer;
      padding: 0.25rem 0.5rem; border-radius: 6px;
      font-family: inherit;
      display: flex; align-items: center; gap: 0.3rem;
    }
    .back-btn:active { opacity: 0.6; }
    .overlay-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.1em; color: #01b9d8;
    }

    /* ── Team Cipher inline content (scoped to .tc-wrap) ─────────── */
    .tc-wrap {
      --tc-bg: #020c18; --tc-surface: #041c2e; --tc-surface2: #07293f;
      --tc-border: rgba(1,185,216,0.35); --tc-border-hi: #01b9d8;
      --tc-text: #e0f8ff; --tc-muted: #4a8fa0; --tc-cyan: #01b9d8;
      --tc-lag: #f5a623; --tc-tch: #4ecf98; --tc-rou: #e85568; --tc-bei: #6aaef7;

      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      background: var(--tc-bg); color: var(--tc-text);
      font-family: 'DM Sans', sans-serif; font-size: 32px;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 80px; -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 480px) { .tc-wrap { font-size: 24px; } }

    .tc-wrap .wrap { width: 100%; max-width: 640px; }
    .tc-wrap header { text-align: center; margin-bottom: 28px; }
    .tc-wrap h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 5.5rem);
      letter-spacing: 0.12em; line-height: 0.9; color: #01b9d8;
      text-shadow: 0 0 8px #01b9d8, 0 0 28px rgba(1,185,216,0.7), 0 0 60px rgba(1,185,216,0.3);
    }
    .tc-wrap .sub {
      margin-top: 10px; font-family: 'DM Mono', monospace;
      font-size: 0.8rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--tc-muted);
    }
    .tc-wrap .clue-panel {
      background: var(--tc-surface); border: 1px solid var(--tc-border);
      border-radius: 16px; padding: 20px; margin-bottom: 20px;
    }
    .tc-wrap .panel-label {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--tc-muted);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .tc-wrap .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--tc-border); }
    .tc-wrap .clue-list { display: flex; flex-direction: column; gap: 20px; }
    .tc-wrap .clue-row {
      display: flex; align-items: flex-start; gap: 14px;
      line-height: 1.7; color: var(--tc-muted); transition: color 0.3s;
    }
    .tc-wrap .clue-row.solved { color: var(--tc-text); }
    .tc-wrap .clue-left { flex-shrink: 0; padding-top: 6px; }
    .tc-wrap .clue-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .tc-wrap .clue-row:not(.solved) .clue-dot { background: var(--tc-muted) !important; }
    .tc-wrap .clue-body { flex: 1; }
    .tc-wrap .clue-team-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: 0.1em; line-height: 1; margin-bottom: 6px;
    }
    .tc-wrap .clue-text { font-size: 1.4rem; line-height: 1.7; }
    .tc-wrap .clue-row strong { font-weight: 600; color: var(--tc-text); }

    .tc-wrap .solved-rows { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .tc-wrap .solved-row {
      border-radius: 14px; padding: 16px 20px;
      animation: tcPopIn 0.38s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes tcPopIn {
      from { opacity: 0; transform: scale(0.9) translateY(-8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .tc-wrap .solved-team-name {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem;
      letter-spacing: 0.1em; color: rgba(0,0,0,0.7); margin-bottom: 6px;
    }
    .tc-wrap .solved-members {
      font-family: 'DM Mono', monospace; font-size: 1.1rem;
      color: rgba(0,0,0,0.6); line-height: 1.6;
    }
    .tc-wrap .lag-bg { background: var(--tc-lag); }
    .tc-wrap .tch-bg { background: var(--tc-tch); }
    .tc-wrap .rou-bg { background: var(--tc-rou); }
    .tc-wrap .bei-bg { background: var(--tc-bei); }

    .tc-wrap .name-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; margin-bottom: 16px;
    }
    @media (min-width: 480px) {
      .tc-wrap .name-grid { grid-template-columns: repeat(4, 1fr); gap: 10px; }
    }
    .tc-wrap .card {
      background: var(--tc-surface); border: 1.5px solid var(--tc-border);
      border-radius: 14px; padding: 20px 10px; text-align: center;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.12s, box-shadow 0.12s;
      user-select: none; -webkit-user-select: none;
      min-height: 90px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
      touch-action: manipulation;
    }
    .tc-wrap .card:active { transform: scale(0.96); }
    .tc-wrap .card.selected {
      border-color: var(--tc-border-hi); background: var(--tc-surface2);
      transform: translateY(-2px);
      box-shadow: 0 0 14px rgba(1,185,216,0.45), 0 6px 20px rgba(0,0,0,0.5);
    }
    .tc-wrap .card.team-lit { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.55); }
    .tc-wrap .card.team-lit .card-first { color: rgba(0,0,0,0.55); }
    .tc-wrap .card.team-lit .card-last  { color: rgba(0,0,0,0.85); }
    .tc-wrap .card.lag-lit { background: var(--tc-lag); border-color: var(--tc-lag); }
    .tc-wrap .card.tch-lit { background: var(--tc-tch); border-color: var(--tc-tch); }
    .tc-wrap .card.rou-lit { background: var(--tc-rou); border-color: var(--tc-rou); }
    .tc-wrap .card.bei-lit { background: var(--tc-bei); border-color: var(--tc-bei); }
    .tc-wrap .card-first {
      font-family: 'DM Mono', monospace; font-size: 1.1rem;
      color: var(--tc-muted); line-height: 1;
    }
    .tc-wrap .card-last {
      font-family: 'DM Mono', monospace; font-size: 1.4rem;
      font-weight: 500; color: var(--tc-text); line-height: 1.2;
    }
    .tc-wrap .card.shake { animation: tcShake 0.38s ease; }
    @keyframes tcShake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-7px); }
      75% { transform: translateX(7px); }
    }
    .tc-wrap .sel-count {
      font-family: 'DM Mono', monospace; font-size: 1.2rem;
      color: var(--tc-muted); text-align: center; min-height: 24px; margin-bottom: 14px;
    }
    .tc-wrap .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .tc-wrap button {
      font-family: 'DM Mono', monospace; font-size: 1.2rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 16px 22px; border-radius: 12px; cursor: pointer;
      transition: all 0.12s; border: 1.5px solid var(--tc-border);
      background: var(--tc-surface); color: var(--tc-text);
      touch-action: manipulation; min-height: 58px;
    }
    .tc-wrap button:active { transform: scale(0.97); }
    .tc-wrap button:disabled { opacity: 0.28; cursor: not-allowed; }
    .tc-wrap .btn-submit {
      background: var(--tc-cyan); color: var(--tc-bg); border-color: var(--tc-cyan);
      font-weight: 600; padding: 16px 32px;
      box-shadow: 0 0 14px rgba(1,185,216,0.5);
    }
    .tc-wrap .btn-submit:not(:disabled):active { opacity: 0.8; }
    .tc-msg {
      text-align: center;
      font-family: 'DM Mono', monospace; font-size: 0.95rem; font-weight: 500;
      color: #e0f8ff;
      max-height: 0; overflow: hidden;
      transition: max-height 0.2s, opacity 0.2s;
      opacity: 0;
    }
    .tc-msg.show { max-height: 4em; opacity: 1; overflow: visible; padding: 0.4rem 0; }
  </style>
</head>
<body>

<div class="contact-header">
  <div class="avatar" id="logo-avatar"><img src="https://the-game-bureau.github.io/tour/resources/360.png" alt="360"></div>
  <div class="contact-name">Mission Control</div>
  <div class="contact-status"><div class="online-dot"></div>online</div>
</div>

<div class="chat" id="chat"></div>
<div class="input-area" id="input-area"></div>

<div class="team-overlay" id="team-overlay">
  <div class="overlay-bar">
    <button class="back-btn" onclick="closeTeamOverlay()">&#8592; Back</button>
    <span class="overlay-title">Team Cipher</span>
  </div>
  <div class="tc-wrap">
    <div class="wrap">
      <header>
        <h1>TEAM CIPHER</h1>
        <p class="sub">4 teams · 4 people each</p>
      </header>
      <div class="clue-panel">
        <div class="panel-label">🎭 Clues</div>
        <div class="clue-list" id="tc-clue-list"></div>
      </div>
      <div class="solved-rows" id="tc-solved-rows"></div>
      <div class="name-grid" id="tc-name-grid"></div>
      <div class="sel-count" id="tc-sel-count"></div>
      <div class="tc-msg"></div>
      <div class="btn-row">
        <button onclick="TC.deselectAll()">Deselect</button>
        <button onclick="TC.shuffleGrid()">Shuffle</button>
        <button class="btn-submit" id="tc-submit-btn" onclick="TC.submitGuess()" disabled>Submit</button>
      </div>
      <div class="tc-msg"></div>
    </div>
  </div>
</div>

<script>
// ── Team definitions ──────────────────────────────────────────────────────────
const TEAMS = {
  beignet:   { name: 'Beignet',       color: '#6aaef7', cls: 'team-beignet',   w3w: 'https://w3w.co/tend.snipped.national'    },
  lagniappe: { name: 'Lagniappe',     color: '#f5a623', cls: 'team-lagniappe', w3w: 'https://w3w.co/ideas.shorter.restore'    },
  rougarou:  { name: 'Rougarou',      color: '#e85568', cls: 'team-rougarou',  w3w: 'https://w3w.co/bearings.student.seats'   },
  tch:       { name: 'Tchoupitoulas', color: '#4ecf98', cls: 'team-tch',       w3w: 'https://w3w.co/captures.sailor.clues'    }
};

const TEAM_KEY_MAP    = { beignet: 'beignet', lagniappe: 'lagniappe', tchoupitoulas: 'tch', rougarou: 'rougarou' };
const TEAM_LETTER_MAP = { a: 'beignet', b: 'lagniappe', c: 'rougarou', d: 'tch' };

const TEAM_DEFS = {
  beignet:   { letter: 'b', text: 'A deep-fried French doughnut', correctMsg: 'Correct! A beignet is a deep-fried French doughnut. We know, too much standing around. Let\'s get moving!', partner: 'Lagniappe',     give: 'JAMBALAYA',  receive: 'gumbo',       receiveLetter: 'g', receiveBlurb: 'Gumbo is the unofficial dish of Louisiana: a thick, dark-roux stew that takes all day and sparks arguments about the correct ingredients all week.' },
  lagniappe: { letter: 'c', text: 'A little something extra',     correctMsg: 'Correct! Lagniappe means a little something extra. 🎁 We know, too much standing around. Let\'s get moving!',   partner: 'Beignet',       give: 'GUMBO',      receive: 'jambalaya',   receiveLetter: 'i', receiveBlurb: 'Jambalaya is Louisiana\'s answer to paella: rice, meat, and vegetables all cooked in one pot.' },
  tch:       { letter: 'a', text: 'A Native American tribe',      correctMsg: 'Correct! The Tchoupitoulas were a Native American tribe. 🪶 We know, we know, this is too much standing around! Let\'s get moving!', partner: 'Rougarou', give: 'ETOUFFEE',   receive: 'muffuletta',  receiveLetter: 'j', receiveBlurb: 'The muffuletta was invented at Central Grocery, right here in New Orleans: a round Sicilian loaf piled with olive salad and Italian meats.' },
  rougarou:  { letter: 'd', text: 'A Cajun werewolf',             correctMsg: 'Correct! The Rougarou is a Cajun werewolf. 🐺 We know, too much standing around. Let\'s get moving!',             partner: 'Tchoupitoulas', give: 'MUFFULETTA', receive: 'etouffee',    receiveLetter: 'e', receiveBlurb: 'Étouffée means \'smothered\' in French: crawfish buried in a rich buttery sauce, served over rice.' }
};

// ── Build step sequence ───────────────────────────────────────────────────────
function buildSteps(teamKey) {
  const t   = teamKey ? TEAMS[teamKey]    : null;
  const def = teamKey ? TEAM_DEFS[teamKey] : null;

  // ── Shared steps (0–5) — ALL TEAMS ───────────────────────────────────────
  // ── INTRO [all teams] ─────────────────────────────────────────────────────
  const s0 = {
    reveal: [
      // ── INTRO ──
      { name: 'intro-we-lied',   html: 'We lied. You still need to use some brain power this evening.' },
      { name: 'intro-type-play', html: 'This IS a team building exercise, but it\'s NOT a walking tour. Think Escape Room meets Scavenger Hunt. Type PLAY to find out what team you\'re on.' }
    ],
    // ── RESPONSE ──
    action: { type: 'text', answers: ['play'] }
  };

  // ── TEAM CIPHER [all teams] ───────────────────────────────────────────────
  const s1 = {
    reveal: [
      // ── INTRO ──
      { name: 'cipher-btn', html: 'Figure out which team you\'re on using the Team Cipher puzzle.<button class="open-cipher-btn" onclick="openTeamOverlay()">Open Team Cipher →</button>' }
    ],
    // ── RESPONSE ──
    action: { type: 'text', placeholder: 'A, B, C or D', answers: ['a', 'b', 'c', 'd', 'beignet', 'lagniappe', 'rougarou', 'tchoupitoulas'], setsTeam: true }
  };

  // ── TEAM DEFINITION [all teams — team-aware: name + correct answer varies] ─
  const s2 = {
    reveal: [
      // ── INTRO ──

if (location.search.includes('reset')) {
  try { localStorage.removeItem('nola360_team'); localStorage.removeItem('nola360_step'); } catch(e) {}
  history.replaceState(null, '', location.pathname);
}

let state = { step: 0, team: null };
try {
  state.team = localStorage.getItem('nola360_team') || null;
  const s = parseInt(localStorage.getItem('nola360_step') || '0', 10);
  if (!isNaN(s) && s > 0) state.step = s;
} catch(e) {}

function saveState() {
  try {
    localStorage.setItem('nola360_step', state.step);
    if (state.team) localStorage.setItem('nola360_team', state.team);
  } catch(e) {}
}

// ── DOM ───────────────────────────────────────────────────────────────────────
const chatEl      = document.getElementById('chat');
const inputAreaEl = document.getElementById('input-area');
const teamOverlay = document.getElementById('team-overlay');
let teamQuestionShown = false;

// Long-press logo (1.5 s) to reset — works on mobile and desktop
(function() {
  const el = document.getElementById('logo-avatar');
  let pressT;
  function doReset() {
    pressT = null;
    try { localStorage.removeItem('nola360_team'); localStorage.removeItem('nola360_step'); } catch(e) {}
    location.reload();
  }
  function cancel() { clearTimeout(pressT); pressT = null; }
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    cancel();
    pressT = setTimeout(doReset, 1500);
  });
  el.addEventListener('pointerup',   cancel);
  el.addEventListener('pointerleave', cancel);
  el.addEventListener('pointermove', cancel);
  // Desktop fallback: triple-click
  let clicks = 0, clickT;
  el.addEventListener('click', () => {
    clicks++;
    clearTimeout(clickT);
    clickT = setTimeout(() => { clicks = 0; }, 500);
    if (clicks >= 3) doReset();
  });
})();

// ── Lightbox ──────────────────────────────────────────────────────────────────
(function() {
  const lb = document.createElement('div');
  lb.className = 'lb';
  const li = document.createElement('img');
  lb.appendChild(li);
  document.body.appendChild(lb);
  lb.addEventListener('click', () => lb.classList.remove('open'));
  document.addEventListener('click', e => {
    const img = e.target.closest('.msg-bubble img');
    if (!img) return;
    li.src = img.src;
    li.alt = img.alt;
    lb.classList.add('open');
  });
})();

function norm(s) { return s.toLowerCase().replace(/[$,.\s]/g, ''); }

function scrollBottom(smooth) {
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

function addMsg(msg, animate) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (msg.fromPlayer ? 'from-player' : 'from-game');
  if (msg.name) wrap.dataset.bubble = msg.name;
  if (!animate) wrap.style.animation = 'none';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (msg.html) bubble.innerHTML = msg.html;
  else bubble.textContent = msg.text || '';
  if (bubble.querySelector('img')) wrap.classList.add('has-img');
  wrap.appendChild(bubble);

  chatEl.appendChild(wrap);
  return wrap;
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(el);
  scrollBottom(true);
  return el;
}

// ── Input rendering ───────────────────────────────────────────────────────────
function renderInput() {
  inputAreaEl.innerHTML = '';

  const steps = buildSteps(state.team);
  if (state.step >= steps.length) return;
  const action = steps[state.step].action;

  if (action.type === 'win') {
    return;
  }

  if (action.type === 'button') {
    const div = document.createElement('div');
    div.className = 'btn-choices';
    const btn = document.createElement('button');
    btn.className = 'choice-btn neutral';
    btn.textContent = action.text;
    btn.addEventListener('click', () => {
      addMsg({ fromPlayer: true, text: action.playerText || action.text }, true);
      doAdvance();
    });
    div.appendChild(btn);
    inputAreaEl.appendChild(div);
    // fall through to also render the (disabled) text input below
  }

  // Always render the text input row (disabled for non-text steps, or setsTeam before question shown)
  const isTextStep = action.type === 'text' &&
                     (!action.setsTeam || teamQuestionShown);

  const row = document.createElement('div');
  row.className = 'answer-row';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'answer-input';
  input.placeholder = action.placeholder || '';
  input.setAttribute('autocomplete', 'off');
  input.setAttribute('autocorrect', 'off');
  input.setAttribute('spellcheck', 'false');
  if (action.type === 'text') input.setAttribute('autocapitalize', 'characters');
  if (!isTextStep) input.disabled = true;

  const sendBtn = document.createElement('button');
  sendBtn.className = 'submit-btn';
  sendBtn.disabled = !isTextStep;
  sendBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';

  const submit = () => {
    const val = input.value.trim();
    if (!val) return;

    const correct = action.answers.some(a => norm(val) === norm(a));
    if (correct) {
      if (action.setsTeam) {
        state.team = TEAM_LETTER_MAP[norm(val)] || TEAM_KEY_MAP[norm(val)] || norm(val);
        saveState();
        addMsg({ fromPlayer: true, text: val.toUpperCase() }, true);
        scrollBottom(true);
        doAdvance();
        return;
      }
      addMsg({ fromPlayer: true, text: val.toUpperCase() }, true);
      doAdvance();
    } else {
      addMsg({ fromPlayer: true, text: val }, true);
      input.value = '';
      input.classList.add('wrong');
      setTimeout(() => input.classList.remove('wrong'), 400);
      addMsg({ html: action.setsTeam
        ? 'Hmm, check that spelling! If you\'re stuck, text <strong>504-581-5652</strong> for help from Mission Control.'
        : 'Ooh, not quite! 🤔 Text <strong>504-581-5652</strong> and Mission Control will get you sorted.' }, true);
      scrollBottom(true);
    }
  };

  if (isTextStep) {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    sendBtn.addEventListener('click', submit);
  }

  row.appendChild(input);
  row.appendChild(sendBtn);
  inputAreaEl.appendChild(row);
  if (isTextStep) setTimeout(() => input.focus(), 150);
}

// ── Advance ───────────────────────────────────────────────────────────────────
function doAdvance() {
  const steps = buildSteps(state.team);
  const correctBubbles = (steps[state.step].action.correct || []);

  state.step++;
  saveState();

  // Disable (not clear) the input so it stays visible during transition
  inputAreaEl.querySelectorAll('input, button').forEach(el => el.disabled = true);
  scrollBottom(true);

  if (state.step >= steps.length) { renderInput(); return; }

  const allBubbles = [...correctBubbles, ...(steps[state.step].reveal || [])];
  if (!allBubbles.length) { renderInput(); return; }

  const typing = addTyping();
  allBubbles.forEach((msg, i) => {
    setTimeout(() => {
      if (i === allBubbles.length - 1) typing.remove();
      addMsg(msg, true);
      scrollBottom(true);
      if (i === allBubbles.length - 1) renderInput();
    }, 700 + i * 400);
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
const steps = buildSteps(state.team);

if (state.step > 0) {
  // Restore: replay all reveal + correct bubbles up to current step
  for (let i = 0; i <= state.step; i++) {
    if (i < steps.length) {
      steps[i].reveal.forEach(msg => addMsg(msg, false));
      if (i < state.step && steps[i].action && steps[i].action.correct) {
        steps[i].action.correct.forEach(msg => addMsg(msg, false));
      }
    }
  }
  if (state.team) teamQuestionShown = true;
  renderInput();
  scrollBottom(false);
} else {
  const bootStep = steps[0];
  const typing = addTyping();
  bootStep.reveal.forEach((msg, i) => {
    setTimeout(() => {
      if (i === bootStep.reveal.length - 1) typing.remove();
      addMsg(msg, true);
      scrollBottom(true);
      if (i === bootStep.reveal.length - 1) renderInput();
    }, 900 + i * 400);
  });
}

function openTeamOverlay() {
  teamOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeTeamOverlay() {
  teamOverlay.classList.remove('open');
  document.body.style.overflow = '';

  // Inject "OK, what's your team name?" the first time Back is tapped on step 1
  const steps = buildSteps(state.team);
  if (!teamQuestionShown && state.step < steps.length && steps[state.step].action.setsTeam) {
    teamQuestionShown = true;
    const t = addTyping();
    setTimeout(() => {
      t.remove();
      addMsg({ name: 'team-question', html: '<p>OK, what\'s your team name?</p><p>A)&nbsp; Beignet<br>B)&nbsp; Lagniappe<br>C)&nbsp; Rougarou<br>D)&nbsp; Tchoupitoulas</p>' }, true);
      scrollBottom(true);
      renderInput();
    }, 500);
  }
}

// ── Team Cipher game (inline) ─────────────────────────────────────────────────
const TC = (() => {
  const TEAMS = {
    beignet: {
      name: 'Beignet',
      members: ['Abigail Beadle', 'Sanil Parambil', 'Rahim Bhimani', 'Chris Bingham'],
      bg: 'bei-bg', color: 'var(--tc-bei)',
      clue: 'All 4 members share at least one consonant in common with the word <strong style="color:var(--tc-text)">"BEIGNET"</strong>.'
    },
    lagniappe: {
      name: 'Lagniappe',
      members: ['Matt Toms', 'Deji Oduntan', 'Aneesh Chakko', 'Arlene Radley'],
      bg: 'lag-bg', color: 'var(--tc-lag)',
      clue: 'Three members of this team each have a first name and last name with <strong>equal letter counts</strong>, but those counts are <strong>not necessarily the same</strong> as other team members. The fourth team member is <strong>Deji</strong> or <strong>Chuck</strong>.'
    },
    tchoupitoulas: {
      name: 'Tchoupitoulas',
      members: ['Rory Sewell', 'Chuck Foster', 'Kamran Kamal', 'Sharon Maxfield'],
      bg: 'tch-bg', color: 'var(--tc-tch)',
      clue: 'Contains one of two people who <strong>share a last name</strong>. Also includes the only person whose <strong>first and last name start with the same letter</strong>, and the person whose <strong>combined first and last name is the longest</strong> in the group. The fourth team member is <strong>Deji</strong> or <strong>Chuck</strong>.'
    },
    rougarou: {
      name: 'Rougarou',
      members: ['Tim Sewell', 'Jeremy Sharp', 'Mo Zaman', 'Jason Atkins'],
      bg: 'rou-bg', color: 'var(--tc-rou)',
      clue: 'This team contains the <strong>first person alphabetically by last name</strong> and the <strong>last person alphabetically by last name</strong>. It also contains <strong>one of two people who share a last name</strong>. One member\'s last name is one of only <strong>two last names in the entire group that doubles as an adjective</strong>.'
    }
  };

  const memberTeam = {};
  for (const [key, t] of Object.entries(TEAMS))
    for (const m of t.members) memberTeam[m] = key;

  let displayOrder = Object.values(TEAMS).flatMap(t => t.members);
  let selected = new Set();
  let solvedTeams = new Set();

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  shuffle(displayOrder);

  const isSolved = name => solvedTeams.has(memberTeam[name]);

  function renderClues() {
    document.getElementById('tc-clue-list').innerHTML = Object.entries(TEAMS).map(([key, t]) => `
      <div class="clue-row ${solvedTeams.has(key) ? 'solved' : ''}">
        <div class="clue-left">
          <div class="clue-dot" style="background:${t.color}"></div>
        </div>
        <div class="clue-body">
          <div class="clue-team-name" style="color:${t.color}">${t.name.toUpperCase()} TEAM</div>
          <div class="clue-text">${t.clue}</div>
        </div>
      </div>`).join('');
  }

  function getTeamLitClass(key) {
    return { lagniappe: 'lag-lit', tchoupitoulas: 'tch-lit', rougarou: 'rou-lit', beignet: 'bei-lit' }[key] || '';
  }

  function allSameTeam() {
    if (selected.size !== 4) return null;
    const keys = [...selected].map(n => memberTeam[n]);
    return keys.every(k => k === keys[0]) ? keys[0] : null;
  }

  function renderGrid() {
    const rem = displayOrder.filter(n => !isSolved(n));
    const litTeam = allSameTeam();
    const litClass = litTeam ? getTeamLitClass(litTeam) : '';
    document.getElementById('tc-name-grid').innerHTML = rem.map(name => {
      const parts = name.split(' ');
      const first = parts[0];
      const last = parts.slice(1).join(' ');
      const isSelected = selected.has(name);
      const cardClass = isSelected ? (litTeam ? `team-lit ${litClass}` : 'selected') : '';
      return `<div class="card ${cardClass}"
        id="tc-c-${name.replace(/ /g, '_')}"
        data-name="${name}">
        <div class="card-first">${first}</div>
        <div class="card-last">${last}</div>
      </div>`;
    }).join('');
    document.getElementById('tc-sel-count').textContent = selected.size ? `${selected.size} of 4 selected` : '';
    document.getElementById('tc-submit-btn').disabled = selected.size !== 4;
  }

  function toggle(name) {
    if (selected.has(name)) {
      selected.delete(name);
    } else {
      if (selected.size >= 4) { showMsg('Deselect someone first'); return; }
      selected.add(name);
    }
    renderGrid();
  }

  function deselectAll() { selected.clear(); renderGrid(); }

  function shuffleGrid() {
    const rem = shuffle(displayOrder.filter(n => !isSolved(n)));
    displayOrder = [...displayOrder.filter(isSolved), ...rem];
    renderGrid();
  }

  function submitGuess() {
    if (selected.size !== 4) return;
    const names = [...selected];
    const keys = names.map(n => memberTeam[n]);

    if (keys.every(k => k === keys[0])) {
      const key = keys[0];
      solvedTeams.add(key);
      selected.clear();
      addSolvedRow(key);
      renderGrid(); renderClues();
      if (solvedTeams.size === Object.keys(TEAMS).length) {
        showMsg('🎉 Got it! <a href="#" onclick="closeTeamOverlay();return false;" style="color:#e0f8ff;">← Back</a> to enter your team name.', true, true);
      } else {
        showMsg('Correct! 🎉');
      }
    } else {
      const counts = {};
      keys.forEach(k => counts[k] = (counts[k] || 0) + 1);
      const oneAway = Object.values(counts).some(c => c === 3);
      names.forEach(name => {
        const el = document.getElementById('tc-c-' + name.replace(/ /g, '_'));
        if (el) { el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400); }
      });
      showMsg(oneAway ? '😬 One away...' : 'Not quite — try again');
    }
  }

  function addSolvedRow(key) {
    const t = TEAMS[key];
    const el = document.createElement('div');
    el.className = `solved-row ${t.bg}`;
    el.innerHTML = `<div class="solved-team-name">${t.name} Team</div>
      <div class="solved-members">${t.members.join(' · ')}</div>`;
    document.getElementById('tc-solved-rows').appendChild(el);
  }

  let msgT;
  function showMsg(msg, persist, isHtml) {
    document.querySelectorAll('.tc-msg').forEach(el => {
      if (isHtml) el.innerHTML = msg; else el.textContent = msg;
      el.classList.add('show');
    });
    clearTimeout(msgT);
    if (!persist) msgT = setTimeout(() => {
      document.querySelectorAll('.tc-msg').forEach(el => el.classList.remove('show'));
    }, 2400);
  }

  document.getElementById('tc-name-grid').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const name = card.dataset.name;
    if (name) toggle(name);
  });

  renderClues();
  renderGrid();

  return { deselectAll, shuffleGrid, submitGuess };
})();
</script>
</body>
</html>
